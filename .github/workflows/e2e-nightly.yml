name: E2E Smoke (Nightly)

# Runs the Playwright smoke test against a fresh build of the extension.
# Catches the bug class where some code path in the popup or sidepanel
# throws on mount and the user sees a blank or broken UI.
#
# Schedule: 03:00 UTC daily (10:00 Bangkok). Also runs on pushes to main
# so we catch regressions at merge time, not 24 hours later.
#
# What this test catches today:
#   - Popup or sidepanel that crashes on mount
#   - Console errors during the initial render
#   - Manifest issues that prevent extension from loading
#
# What this test does NOT catch (yet):
#   - Auth-flow regressions (needs test account + cookie injection)
#   - Real Gmail/Slack/LinkedIn DOM interactions
#   - Visual regressions

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Build extension
        run: npm run build

      - name: Run smoke tests
        run: |
          # Need a virtual display because extension contexts require headed mode.
          xvfb-run -a npx playwright test
        env:
          CI: true
          # Auth-flow tests will SKIP if these aren't set. Configure the
          # extension repo's GitHub Actions secrets:
          #   TEST_USER_EMAIL    -- e.g. e2e-test@insidea.com
          #   TEST_USER_PASSWORD -- the test account's password
          # Test user must have onboarding completed + valid Gmail connection.
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          PRANAN_APP_ORIGIN: ${{ secrets.PRANAN_APP_ORIGIN || 'https://app.pranan.ai' }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
