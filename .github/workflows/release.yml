name: Release

# Tag-driven release. When a tag like v0.3.0 is pushed, this workflow:
#   1. Builds dist + zips it
#   2. Uploads to Chrome Web Store (only if all four CWS secrets are set)
#   3. Creates a GitHub Release with the zip attached
#
# The Chrome Web Store upload is gated behind a "secrets configured" check
# so a release tag still produces a GitHub Release artifact even when the
# CWS credentials are absent. This avoids the previous failure mode where
# a missing secret killed the entire workflow and skipped Release creation.

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # softprops/action-gh-release needs contents:write to create the
    # release. The default GITHUB_TOKEN is read-only unless we ask for
    # this explicitly. Without it the release step 403s and we lose
    # the tagged artifact.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      # Guard: package.json and public/manifest.json must agree, and both
      # must match the pushed tag. Caught a Chrome Web Store rejection on
      # 2026-05-06 when these drifted; this fails the workflow before the
      # build wastes ~2min.
      - name: Verify version sync
        run: |
          PKG=$(node -p "require('./package.json').version")
          MAN=$(node -p "require('./public/manifest.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json: $PKG"
          echo "manifest.json: $MAN"
          echo "tag (no v): $TAG"
          if [ "$PKG" != "$MAN" ]; then
            echo "::error::package.json ($PKG) and manifest.json ($MAN) disagree. Run scripts/bump-version.mjs to keep them in sync."
            exit 1
          fi
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline --no-audit --no-fund
      - run: npm run build
      - name: Zip dist
        run: cd dist && zip -r ../pranan-companion-${{ github.ref_name }}.zip .

      # Probe whether the Chrome Web Store secrets are configured. We can't
      # check `secrets.X != ''` directly in `if:` because the values are
      # masked, so we bounce them through an env var first and read from
      # there. The output is a step output we gate the upload on.
      - name: Detect Chrome Web Store credentials
        id: cws
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [[ -n "$CHROME_EXTENSION_ID" && -n "$CHROME_CLIENT_ID" && -n "$CHROME_CLIENT_SECRET" && -n "$CHROME_REFRESH_TOKEN" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Chrome Web Store credentials present -- will upload"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Chrome Web Store credentials missing -- skipping upload (GitHub Release still runs)"
          fi

      # CWS rejection (e.g. previous version still in review) is an
      # external queue issue, not a code problem. Don't fail the whole
      # release on it — keep going so the GitHub Release artifact is
      # still created and downloadable.
      - name: Upload to Chrome Web Store
        id: cws-upload
        if: steps.cws.outputs.configured == 'true'
        continue-on-error: true
        uses: mnao305/chrome-extension-upload@v6.0.0
        with:
          file-path: pranan-companion-${{ github.ref_name }}.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: false # uploads but doesn't auto-publish; review in dashboard

      # Always create the GitHub Release with the zip artifact, regardless
      # of whether CWS upload succeeded. The zip is the source of truth for
      # manual CWS uploads, fallback installs, and reproduction.
      - name: Create GitHub Release
        if: always()
        uses: softprops/action-gh-release@v3
        with:
          files: pranan-companion-${{ github.ref_name }}.zip
          generate_release_notes: true

      # Job summary so the workflow run page tells you exactly what
      # happened. Exits 0 even if CWS upload was queue-blocked because
      # that's not a code-quality failure — just a CWS-side queueing
      # mechanic. If you need to re-attempt the upload, manually
      # upload the GitHub Release zip via chrome.google.com/webstore/devconsole
      # OR re-run this workflow once previous version clears review.
      - name: Status summary
        if: always()
        run: |
          {
            echo "### Release ${{ github.ref_name }}"
            echo
            if [[ "${{ steps.cws-upload.outcome }}" == "success" ]]; then
              echo "- ✅ Chrome Web Store: uploaded (in review)"
            elif [[ "${{ steps.cws-upload.outcome }}" == "skipped" ]]; then
              echo "- ⏭️ Chrome Web Store: skipped (credentials missing)"
            else
              echo "- ⚠️ Chrome Web Store: upload failed (likely queue-blocked by previous version still in review)"
              echo "  - The GitHub Release zip is still available; manual upload via CWS dashboard is the fallback."
              echo "  - Re-run this workflow once previous version clears CWS review."
            fi
            echo "- ✅ GitHub Release: pranan-companion-${{ github.ref_name }}.zip"
          } >> "$GITHUB_STEP_SUMMARY"

